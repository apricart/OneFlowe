AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Runs the OneFlowe auto-fulfill cron once a day at 07:00 PKT (02:00 UTC)
  via EventBridge Rule + API Destination.

  NOTE: EventBridge Rule schedules are always UTC. 02:00 UTC = 07:00 PKT (UTC+5).
  Change the ScheduleExpression parameter if you need a different time.

Parameters:
  AppUrl:
    Type: String
    Description: "Full base URL of your Amplify app, no trailing slash. E.g. https://main.abc123.amplifyapp.com"

  CronSecret:
    Type: String
    NoEcho: true
    Description: "The CRON_SECRET env var value set in your Amplify app."

  ScheduleExpression:
    Type: String
    Default: "cron(0 2 * * ? *)"
    Description: "EventBridge cron in UTC. Default: 02:00 UTC = 07:00 PKT."

Resources:

  # Stores the Authorization header (Bearer <secret>) used on every call.
  CronApiConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub "${AWS::StackName}-connection"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub "Bearer ${CronSecret}"

  # HTTP endpoint definition.
  CronApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub "${AWS::StackName}-destination"
      ConnectionArn: !GetAtt CronApiConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub "${AppUrl}/api/v1/orders/cron/auto-fulfill"
      InvocationRateLimitPerSecond: 1

  # IAM role that allows EventBridge Rule to call the API destination.
  # Principal must be events.amazonaws.com (not scheduler.amazonaws.com).
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt CronApiDestination.Arn

  # The rule — fires on schedule and POSTs to the auto-fulfill endpoint.
  AutoFulfillRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-auto-fulfill"
      Description: "Auto-fulfills OneFlowe APPROVED+DELIVERED orders with no refund after 48 h"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt CronApiDestination.Arn
          Id: AutoFulfillTarget
          RoleArn: !GetAtt SchedulerRole.Arn
          Input: "{}"
          RetryPolicy:
            MaximumRetryAttempts: 2
            MaximumEventAgeInSeconds: 600

Outputs:
  RuleName:
    Value: !Ref AutoFulfillRule
    Description: EventBridge Rule name

  ApiDestinationArn:
    Value: !GetAtt CronApiDestination.Arn
    Description: ARN of the EventBridge API destination
